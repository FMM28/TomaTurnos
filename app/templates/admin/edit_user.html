{% extends "admin/base_admin.html" %}

{% block content %}

<section class="form-page">

    <header class="page-header">
        <h1 class="page-title">Editar usuario: {{ user.username }}</h1>
    </header>

    <div class="form-card">
        <form method="POST">
            
            <div class="form-group">
                <label for="username" class="form-label">Nombre de usuario</label>
                <input type="text" 
                       id="username" 
                       name="username" 
                       class="form-input" 
                       value="{{ user.username }}" 
                       required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Nueva contraseña (opcional)</label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       class="form-input" 
                       placeholder="Deja vacío si no deseas cambiarla">
            </div>

            <div class="form-group">
                <label for="role" class="form-label">Rol</label>
                <select id="role" 
                        name="role" 
                        class="form-select" 
                        required>
                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Administrador</option>
                    <option value="usuario" {% if user.role == 'usuario' %}selected{% endif %}>Usuario</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Actualizar</button>
                <a href="{{ url_for('admin.users') }}" class="btn-secondary">Cancelar</a>
            </div>

        </form>
    </div>

</section>

{% endblock %}
