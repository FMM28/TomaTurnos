{% extends "admin/base_form.html" %}

{% set page_title = 'Editar Ventanilla' if ventanilla else 'Crear Ventanilla' %}
{% set submit_text = 'Actualizar' if ventanilla else 'Crear' %}
{% set cancel_url = url_for('admin.ventanillas') %}

{% block form_fields %}
    <div class="form-group">
        <label for="name" class="form-label">Nombre de la Ventanilla *</label>
        <input 
            type="text" 
            id="name" 
            name="name" 
            class="form-input" 
            value="{{ ventanilla.name if ventanilla else '' }}" 
            required
            maxlength="45"
            placeholder="Ej: Ventanilla 1">
    </div>

    <div class="form-group">
        <label for="id_area" class="form-label">Área</label>
        <select id="id_area" name="id_area" class="form-input">
            <option value="">Sin área asignada</option>
            {% for area in areas %}
                <option value="{{ area.id_area }}" 
                    {% if ventanilla and ventanilla.id_area == area.id_area %}selected{% endif %}>
                    {{ area.name }}
                </option>
            {% endfor %}
        </select>
    </div>
{% endblock %}
