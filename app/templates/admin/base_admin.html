<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/ticketsQLogo_white.svg') }}" type="image/x-icon">
    <title>{% block title %}Admin{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="admin-layout">
    
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    
    {% include "admin/_sidebar.html" %}

    <main class="admin-content">
        
        <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Abrir menú">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        {% block content %}{% endblock %}
    </main>

</div>

<script src="{{ url_for('static', filename='js/admin_menu.js') }}"></script>
<script src="{{ url_for('static', filename='js/refresh_csrf.js') }}"></script>

</body>
</html>
